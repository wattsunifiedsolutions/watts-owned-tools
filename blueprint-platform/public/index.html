<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <title>Watts Blueprint Platform</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f6f8; color: #16202a; }
      main { width: min(680px, calc(100% - 40px)); padding: 48px; background: #fff; border: 1px solid #dfe3e8; border-radius: 16px; box-shadow: 0 18px 55px rgba(17, 29, 40, .08); }
      p:first-child { margin-top: 0; color: #9a710c; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 8px 0 18px; font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.02; }
      p { line-height: 1.65; color: #52606d; }
      code { padding: 3px 7px; border-radius: 5px; background: #f0f2f5; color: #1f2d3a; }
      .status { display: inline-flex; align-items: center; gap: 8px; margin-top: 18px; color: #176b3a; font-weight: 750; }
      .status::before { content: ""; width: 10px; height: 10px; border-radius: 50%; background: #23a45d; box-shadow: 0 0 0 5px rgba(35,164,93,.12); }
    </style>
  </head>
  <body>
    <main>
      <p>Watts Unified Solutions</p>
      <h1>Blueprint environment</h1>
      <p>
        This isolated Cloudflare container is ready for independently owned tools at routes such as
        <code>/debt-free</code>, <code>/tax-buckets</code>, and <code>/retirement</code>.
      </p>
      <div class="status">Base container active</div>
    </main>
  </body>
</html>
